<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NYU Urology — Residency</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--nyu:#57068c;--nyu2:#8900e1;--ink:#1c1c22;--mut:#6b6b76;--line:#e3e3ea;--bg:#f7f7fa;--card:#fff;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
a{color:var(--nyu)}
header.top{background:linear-gradient(100deg,var(--nyu),var(--nyu2));color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header.top h1{font-size:17px;margin:0;font-weight:700}
header.top .sub{font-size:12px;opacity:.85;margin-top:2px}
.nav{display:flex;gap:6px}
.nav a{color:#fff;text-decoration:none;font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.35)}
.nav a.on{background:#fff;color:var(--nyu);font-weight:700}
.badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.wrap{display:grid;grid-template-columns:1fr 360px;gap:0;height:calc(100vh - 110px);min-height:520px}
#map{height:100%;width:100%}
.side{border-left:1px solid var(--line);background:var(--card);overflow-y:auto;padding:12px}
.controls{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.controls .grp{display:flex;flex-direction:column;gap:3px}
.controls label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);font-weight:700}
.controls select,.controls input[type=search]{font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:#fff}
.legend{display:flex;gap:6px;flex-wrap:wrap}
.lg{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);cursor:pointer;user-select:none;background:#fff}
.lg .dot{width:10px;height:10px;border-radius:50%}
.lg.off{opacity:.35;text-decoration:line-through}
.toggle{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.toggle button{border:0;background:#fff;padding:5px 9px;font-size:12px;cursor:pointer}
.toggle button.on{background:var(--nyu);color:#fff}
.btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
.btn.primary{background:var(--nyu);color:#fff;border-color:var(--nyu)}
.panel{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
.panel h3{margin:0;padding:9px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;background:#faf7fd;color:var(--nyu);border-bottom:1px solid var(--line)}
.panel .bd{padding:8px 12px}
.lead-row{padding:6px 0;border-bottom:1px dashed var(--line);font-size:12px}
.lead-row:last-child{border-bottom:0}
.lead-row .ins{color:var(--mut)}
.muted{color:var(--mut)}
.detail .nm{font-size:16px;font-weight:700}
.detail .meta{font-size:12px;color:var(--mut);margin:2px 0 8px}
.detail .kv{font-size:12.5px;margin:5px 0;line-height:1.45}
.detail .kv b{color:var(--nyu)}
.chip{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;color:#fff;font-weight:600}
.career{margin:8px 0 0;padding-left:0;list-style:none}
.career li{font-size:12px;padding:3px 0 3px 16px;position:relative}
.career li:before{content:"";position:absolute;left:3px;top:8px;width:8px;height:8px;border-radius:50%;background:var(--nyu)}
.conf{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.conf.H{background:#e4f6e9;color:#1d8a3f}.conf.M{background:#fef3d8;color:#9a6700}.conf.L,.conf{background:#fde4e4;color:#b3261e}
.narr{height:170px;overflow:auto;font-size:12px;background:#0e0e16;color:#e7e7f0;border-radius:8px;padding:8px 10px;line-height:1.5}
.narr .ev{margin-bottom:4px}.narr .yr{color:#c79bff;font-weight:700}
.movie-ctrl{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.year-big{font-size:26px;font-weight:800;color:var(--nyu);min-width:64px;text-align:center}
.grad-tl{display:flex;flex-direction:column;gap:10px;padding:12px 14px;background:#fff;border-top:1px solid var(--line)}
.era{border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.era h4{margin:0 0 6px;font-size:12px;color:var(--nyu);text-transform:uppercase;letter-spacing:.5px}
.era .names{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:#fff;display:inline-flex;gap:5px;align-items:center}
.pill .d{width:8px;height:8px;border-radius:50%}
.pill:hover{border-color:var(--nyu)}
.foot{padding:14px 20px;font-size:11px;color:var(--mut);background:#fff;border-top:1px solid var(--line)}
.headicon{border-radius:50%;border:2px solid #fff;background-size:cover;background-position:center}
.doticon{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.pulse{animation:pls 1.2s ease-out}@keyframes pls{0%{transform:scale(.2);opacity:.2}60%{transform:scale(1.5);opacity:1}100%{transform:scale(1)}}
.tabbar{display:flex;gap:4px;margin-bottom:8px}
.tabbar button{flex:1;font-size:11px;padding:6px 4px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer}
.tabbar button.on{background:var(--nyu);color:#fff;border-color:var(--nyu)}
@media(max-width:900px){.wrap{grid-template-columns:1fr;height:auto}#map{height:60vh}.side{border-left:0;border-top:1px solid var(--line)}}
</style>
</head>
<body>
<header class="top">
  <div>
    <h1 id="pgTitle"></h1><div class="sub" id="pgSub"></div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="residency.html" id="navRes">Residency</a>
      <a href="fellowship.html" id="navFel">Fellowship</a>
    </div>
    <div class="badge">DRAFT</div>
  </div>
</header>

<div class="controls">
  <div class="grp"><label>Search</label><input type="search" id="search" placeholder="name, city, institution…"></div>
  <div class="grp"><label>Era</label>
    <select id="era"><option value="">All eras</option>
      <option value="1996-2000">1996–2000</option><option value="2001-2005">2001–2005</option>
      <option value="2006-2010">2006–2010</option><option value="2011-2015">2011–2015</option>
      <option value="2016-2020">2016–2020</option><option value="2021-2026">2021–2026</option></select>
  </div>
  <div class="grp"><label>Setting</label>
    <div class="toggle" id="setTog"><button data-s="all" class="on">All</button><button data-s="academic">Academic</button><button data-s="private">Private</button></div>
  </div>
  <div class="grp"><label>Lines to NYU</label>
    <div class="toggle" id="lineTog"><button data-l="on" class="on">On</button><button data-l="off">Off</button></div>
  </div>
  <div class="grp" style="flex:1;min-width:220px"><label id="legLabel">Category</label><div class="legend" id="legend"></div></div>
</div>

<div class="wrap">
  <div id="map"></div>
  <div class="side">
    <div class="panel"><h3>Play history</h3><div class="bd">
      <div class="movie-ctrl"><button class="btn primary" id="play">▶ Play</button><button class="btn" id="stepf">▶</button><button class="btn" id="reset">Reset</button><div class="year-big" id="yearBig">—</div></div>
      <div class="narr" id="narr"><div class="muted">Press Play to fan graduates out from NYU year by year. Years are approximate (completion year used as departure year).</div></div>
    </div></div>
    <div id="detail" class="panel" style="display:none"><h3>Selected graduate</h3><div class="bd detail" id="detailBody"></div></div>
    <div class="panel"><h3>Leadership &amp; rankings</h3><div class="bd">
      <div class="tabbar" id="leadTabs"><button data-k="chiefs" class="on">Chairs &amp; Chiefs</button><button data-k="dirs">Directors</button><button data-k="hindex">Top h-index</button></div>
      <div id="leadBody"></div></div></div>
    <div class="panel"><h3>Counts</h3><div class="bd" id="counts" style="font-size:12.5px"></div></div>
  </div>
</div>
<div class="grad-tl" id="gradTl"></div>
<div class="foot" id="foot"></div>

const seen={};
PEOPLE.forEach(p=>{if(!p.latlng)return;const k=p.latlng[0].toFixed(2)+','+p.latlng[1].toFixed(2);seen[k]=(seen[k]||0);const n=seen[k]++;if(n>0){const a=n*2.39996,r=0.05*Math.sqrt(n);p.disp=[p.latlng[0]+r*Math.cos(a),p.latlng[1]+r*Math.sin(a)];}else p.disp=p.latlng.slice();});

const markers={},lines={};
const lineLayer=L.layerGroup().addTo(map), markerLayer=L.layerGroup().addTo(map);
function makeIcon(p,s){s=s||16;return L.divIcon({className:'',html:`<div class="doticon" style="width:${s}px;height:${s}px;background:${p.color}"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});}
function tryHeadshot(p,m){const img=new Image();img.onload=()=>{const s=26;m.setIcon(L.divIcon({className:'',html:`<div class="headicon" style="width:${s}px;height:${s}px;background-image:url('${p.photo}');box-shadow:0 0 0 2px ${p.color}"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]}));};img.src=p.photo;}
PEOPLE.forEach(p=>{if(!p.disp)return;const m=L.marker(p.disp,{icon:makeIcon(p)});m.on('click',()=>selectPerson(p));m.bindTooltip(`${p.name} '${String(p.year).slice(2)} — ${p.city}`,{direction:'top'});markers[p.slug]=m;tryHeadshot(p,m);lines[p.slug]=L.polyline([NYU,p.disp],{color:p.color,weight:1,opacity:.25});});

const state={era:'',setting:'all',cats:new Set(CATS),search:'',lines:true};
function inEra(y){if(!state.era)return true;if(!y)return false;const[a,b]=state.era.split('-').map(Number);return y>=a&&y<=b;}
function passes(p){if(state.setting!=='all'&&p.settingClass!==state.setting)return false;if(!inEra(p.year))return false;if(!state.cats.has(p.cat))return false;if(state.search){const q=state.search.toLowerCase();if(!((p.name+' '+p.city+' '+(p.institution||'')+' '+(p.fellowship||'')+' '+p.cat).toLowerCase().includes(q)))return false;}return true;}
function applyFilters(){lineLayer.clearLayers();markerLayer.clearLayers();let n=0;PEOPLE.forEach(p=>{if(!p.disp)return;if(passes(p)){markerLayer.addLayer(markers[p.slug]);if(state.lines)lineLayer.addLayer(lines[p.slug]);n++;}});document.getElementById('counts').innerHTML=countsHtml(n);}
function countsHtml(n){const by={};PEOPLE.forEach(p=>by[p.cat]=(by[p.cat]||0)+1);const lines=Object.keys(by).map(c=>`<span style="display:inline-flex;gap:4px;align-items:center;margin-right:8px"><span style="width:9px;height:9px;border-radius:50%;background:${COLORS[c]};display:inline-block"></span>${c} ${by[c]}</span>`).join('');return `<div><b>${n}</b> shown on map of ${PEOPLE.filter(p=>p.disp).length} mapped</div><div style="margin-top:5px;line-height:1.8">${lines}</div>`;}

const legend=document.getElementById('legend');
CATS.forEach(c=>{const el=document.createElement('span');el.className='lg';el.innerHTML=`<span class="dot" style="background:${COLORS[c]}"></span>${c}`;el.onclick=()=>{if(state.cats.has(c)){state.cats.delete(c);el.classList.add('off')}else{state.cats.add(c);el.classList.remove('off')}applyFilters();};legend.appendChild(el);});
document.getElementById('search').oninput=e=>{state.search=e.target.value;applyFilters();};
document.getElementById('era').onchange=e=>{state.era=e.target.value;applyFilters();};
function tog(id,key,attr){document.querySelectorAll('#'+id+' button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(key==='lines'){state.lines=(b.dataset[attr]==='on');}else{state[key]=b.dataset[attr];}applyFilters();};});}
tog('setTog','setting','s');tog('lineTog','lines','l');

function bibHtml(p){const b=p.biblio;if(!b)return '';if(!b.h&&!b.pubs)return `<div class="kv muted" style="font-size:11px"><b>Bibliometrics:</b> ${b.src||'not collected'}</div>`;const h=(b.h!=null)?`h-index <b>${b.h}</b>`:`h-index <span class="muted">pending</span>`;const split=(b.peer!=null||b.other!=null)?` · peer-reviewed ${b.peer!=null?b.peer:'?'} / other ${b.other!=null?b.other:'?'}`:'';const tot=(b.pubs!=null)?` · ~${b.pubs} pubs`:'';return `<div class="kv"><b>Bibliometrics:</b> ${h}${tot}${split} <span class="conf ${b.conf||'L'}">${b.conf||'?'}</span><br><span class="muted" style="font-size:10.5px">${b.src||''}</span></div>`;}

function selectPerson(p){const d=document.getElementById('detail');d.style.display='';const car=p.career.map(c=>`<li><b>${c.year||'?'}</b> — ${c.place}${c.type==='origin'?' <span class="muted">(graduated)</span>':''}${c.approx?' <span class="muted">(approx.)</span>':''}</li>`).join('');
  document.getElementById('detailBody').innerHTML=`<div class="nm">${p.name} <span class="conf ${p.confidence||''}">${p.confidence||'?'}</span></div>
  <div class="meta">${CFG.mode==='residency'?'Residency':'Fellowship'} · class of ${p.year} ${p.medschool?('· '+p.medschool+' MD'):''}</div>
  <span class="chip" style="background:${p.color}">${p.cat}</span>
  <div class="kv"><b>Current:</b> ${p.institution||'—'} — ${p.city}${p.st?(', '+p.st):''} (${p.setting||'—'})</div>
  <div class="kv"><b>Fellowship:</b> ${p.fellowship||'—'}</div>
  ${p.leadership&&!/^none/i.test(p.leadership)&&p.leadership.trim()?`<div class="kv"><b>Leadership:</b> ${p.leadership}</div>`:''}
  ${p.research?`<div class="kv"><b>Research:</b> ${p.research}</div>`:''}
  ${bibHtml(p)}
  <div class="kv"><b>Career path:</b><ul class="career">${car}</ul></div>
  ${p.flags?`<div class="kv muted" style="font-size:11px"><b>Notes:</b> ${p.flags}</div>`:''}
  ${p.source?`<div class="kv" style="font-size:11px"><b>Source:</b> ${p.source}</div>`:''}`;
  if(p.disp){map.setView(p.disp,6,{animate:true});const m=markers[p.slug];if(m._icon)m._icon.classList.add('pulse');setTimeout(()=>{if(m._icon)m._icon.classList.remove('pulse')},1300);}
  d.scrollIntoView({behavior:'smooth',block:'nearest'});}

function leadRows(a){return a.map(x=>`<div class="lead-row"><b>${x.name}</b> <span class="muted">'${String(x.year).slice(2)}</span><br>${x.title}<br><span class="ins">${x.inst}</span></div>`).join('');}
function renderLead(k){const body=document.getElementById('leadBody');
  if(k==='chiefs'){body.innerHTML=leadRows(LEAD.chiefs)+`<div class="muted" style="font-size:11px;margin-top:6px">True Chairs / division Chiefs (and notable leadership). Vice-chairs and interim roles excluded.</div>`;}
  else if(k==='dirs'){body.innerHTML=leadRows(LEAD.directors);}
  else{const ranked=PEOPLE.filter(p=>p.biblio&&p.biblio.h!=null).sort((a,b)=>b.biblio.h-a.biblio.h);if(!ranked.length){body.innerHTML='<div class="muted" style="font-size:12.5px">No verified h-index values for this group yet (bibliometrics pass pending for fellows).</div>';return;}const row=p=>`<div class="lead-row" style="cursor:pointer" data-slug="${p.slug}"><b>h ${p.biblio.h}</b> — ${p.name} <span class="muted">'${String(p.year).slice(2)}</span><br><span class="ins">${p.institution||p.city} · ~${p.biblio.pubs||'?'} pubs</span></div>`;body.innerHTML=ranked.slice(0,5).map(row).join('')+`<div id="hRest" style="display:none">${ranked.slice(5).map(row).join('')}</div>`+(ranked.length>5?`<button class="btn" id="hMore" style="margin-top:6px">Show all ${ranked.length}</button>`:'');const mb=document.getElementById('hMore');if(mb)mb.onclick=()=>{const r=document.getElementById('hRest');const sh=r.style.display==='none';r.style.display=sh?'':'none';mb.textContent=sh?'Show top 5':('Show all '+ranked.length);};body.querySelectorAll('.lead-row[data-slug]').forEach(el=>el.onclick=()=>{const pp=PEOPLE.find(x=>x.slug===el.dataset.slug);if(pp)selectPerson(pp);});}}
document.querySelectorAll('#leadTabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#leadTabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderLead(b.dataset.k);});

let movieYear=null,movieTimer=null;
const ys=PEOPLE.filter(p=>p.year).map(p=>p.year);const minY=Math.min(...ys),maxY=Math.max(...ys);
function arc(a,b){const[la,lo]=a,[lb,lob]=b;const mx=(la+lb)/2,my=(lo+lob)/2,dx=lb-la,dy=lob-lo;const cx=mx-dy*0.18,cy=my+dx*0.18;const p=[];for(let t=0;t<=1;t+=0.05){const u=1-t;p.push([u*u*la+2*u*t*cx+t*t*lb,u*u*lo+2*u*t*cy+t*t*lob]);}return p;}
const mLayer=L.layerGroup();
function mReset(){clearInterval(movieTimer);movieTimer=null;movieYear=null;mLayer.clearLayers();map.removeLayer(mLayer);document.getElementById('yearBig').textContent='—';document.getElementById('narr').innerHTML='<div class="muted">Press Play to fan graduates out from NYU year by year.</div>';document.getElementById('play').textContent='▶ Play';markerLayer.addTo(map);lineLayer.addTo(map);applyFilters();}
function mStart(){markerLayer.remove();lineLayer.remove();mLayer.clearLayers();mLayer.addTo(map);movieYear=minY-1;document.getElementById('narr').innerHTML='';stepTo(minY);movieTimer=setInterval(()=>{if(movieYear>=maxY){clearInterval(movieTimer);movieTimer=null;document.getElementById('play').textContent='▶ Play';return;}stepTo(movieYear+1);},1400);document.getElementById('play').textContent='⏸ Pause';}
function stepTo(y){movieYear=y;document.getElementById('yearBig').textContent=y;const grp=PEOPLE.filter(p=>p.year===y&&p.disp);const narr=document.getElementById('narr');const ev=document.createElement('div');ev.className='ev';ev.innerHTML=`<span class="yr">${y}</span> — ${grp.length} graduate${grp.length===1?'':'s'}`;narr.prepend(ev);grp.forEach((p,i)=>setTimeout(()=>{L.polyline(arc(NYU,p.disp),{color:p.color,weight:1.6,opacity:.55}).addTo(mLayer);const m=L.marker(p.disp,{icon:makeIcon(p,15)}).addTo(mLayer);m.on('click',()=>selectPerson(p));m.bindTooltip(`${p.name} — ${p.city}`,{direction:'top'});if(m._icon)m._icon.classList.add('pulse');const l=document.createElement('div');l.className='ev';l.style.marginLeft='10px';l.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color}"></span> ${p.name} → ${p.city}${p.st?(', '+p.st):''} <span class="muted">(${p.cat})</span>`;narr.prepend(l);narr.scrollTop=0;},i*120));}
document.getElementById('play').onclick=()=>{if(movieTimer){clearInterval(movieTimer);movieTimer=null;document.getElementById('play').textContent='▶ Play';}else{mStart();}};
document.getElementById('stepf').onclick=()=>{if(movieYear===null){markerLayer.remove();lineLayer.remove();mLayer.addTo(map);movieYear=minY-1;}if(movieYear<maxY)stepTo(movieYear+1);};
document.getElementById('reset').onclick=mReset;
applyFilters();
</script>
</body>
